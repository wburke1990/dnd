# typos configuration — runs from the pre-commit hook.
# https://github.com/crate-ci/typos

[default.extend-words]
# D&D / TTRPG vocabulary that typos mis-flags.
tiefling = "tiefling"
tieflings = "tieflings"
drow = "drow"
warlock = "warlock"
warlocks = "warlocks"
artificer = "artificer"
illithid = "illithid"
illithids = "illithids"
mindflayer = "mindflayer"
githyanki = "githyanki"
githzerai = "githzerai"
yuan = "yuan"
nat = "nat"

[default.extend-identifiers]
# TTS / Lua identifiers.
GUID = "GUID"
guid = "guid"

[files]
# TTS save files are large JSON blobs — vendor-shaped, not worth scanning.
# Patterns need to match against the absolute path typos walks, so the
# leading "**/" is load-bearing — bare "tts/saves/**" matches nothing.
extend-exclude = [
    "uv.lock",
    "**/tts/saves/**",
    "**/tts/saves-mirror/**",
    "**/tts/mods-mirror/**",
    "**/tts/assets/cache/**",
    # Per-object Lua/XML/manifest extracted from saves — upstream-shaped
    # content (Borbold's OneWorld code, user-given nicknames). Our own
    # edits in here are small and unlikely to introduce real typos.
    "**/tts/lua/**",
    # Test fixtures contain the literal OneWorld "_OW_aBaG_..." prefix,
    # which typos parses as a/Ba/G and flags Ba as a typo of By/Be.
    "**/scripts/tests/test_import_ow_map.py",
    "campaign/*.db",
    "*.db",
]
