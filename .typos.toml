# typos configuration — runs from the pre-commit hook.
# https://github.com/crate-ci/typos

[default.extend-words]
# OneWorld bag-name prefix "_OW_aBaG_" / "_OW_xBaG_": typos splits the
# identifier as a/Ba/G and flags "Ba" as a typo of "By"/"Be". This
# repeats in code, fixtures, and docs — whitelist the word once.
Ba = "Ba"
# OneWorld function names with upstream typos that we must reference
# verbatim in docs / commit messages: TogleEnable (should be "Toggle"),
# ParceData (should be "Parse").
Togle = "Togle"
Parce = "Parce"
# D&D / TTRPG vocabulary that typos mis-flags.
tiefling = "tiefling"
tieflings = "tieflings"
drow = "drow"
warlock = "warlock"
warlocks = "warlocks"
artificer = "artificer"
illithid = "illithid"
illithids = "illithids"
mindflayer = "mindflayer"
githyanki = "githyanki"
githzerai = "githzerai"
yuan = "yuan"
nat = "nat"
# Egyptian mythology / campaign proper nouns typos mis-flags.
Hapy = "Hapy"  # Son of Horus / Nile god — not "Happy"
Shepard = "Shepard"  # chosen name of a Kuru warforged (SH3P4RD) — not "Shepherd"
Mak = "Mak"  # place name: Ilka Mak, Noku Kurunatuka's beachhead on Musleheim
# Archaic spellings kept verbatim inside quoted public-domain poems in
# handouts/ (not our prose — do not "correct" the poem).
layed = "layed"  # Ezra Pound, "The Seafarer" (1911): "The blade is layed low."

[default.extend-identifiers]
# TTS / Lua identifiers.
GUID = "GUID"
guid = "guid"

[files]
# TTS save files are large JSON blobs — vendor-shaped, not worth scanning.
# Patterns need to match against the absolute path typos walks, so the
# leading "**/" is load-bearing — bare "tts/saves/**" matches nothing.
extend-exclude = [
    "uv.lock",
    "**/tts/saves/**",
    "**/tts/saves-mirror/**",
    "**/tts/mods-mirror/**",
    "**/tts/assets/cache/**",
    # Per-object Lua/XML/manifest extracted from saves — upstream-shaped
    # content (Borbold's OneWorld code, user-given nicknames). Our own
    # edits in here are small and unlikely to introduce real typos.
    "**/tts/lua/**",
    # Map-import inventory: a catalog of verbatim user-given TTS bag
    # nicknames (Bottem, Cript, Labrynth, Carrage, …) — kept exact because
    # the OneWorld import keys on the literal nickname. Not prose to fix.
    "**/tts/one-world-maps-inventory.md",
    # Test fixtures contain the literal OneWorld "_OW_aBaG_..." prefix,
    # which typos parses as a/Ba/G and flags Ba as a typo of By/Be.
    "**/scripts/tests/test_import_ow_map.py",
    "campaign/*.db",
    "*.db",
]
